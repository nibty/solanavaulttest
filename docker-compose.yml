services:
  vault:
    image: openbao/openbao:2.5.2
    ports:
      - "8200:8200"
    environment:
      BAO_DEV_ROOT_TOKEN_ID: root-token
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - ./vault:/vault/config:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "BAO_ADDR=http://127.0.0.1:8200 bao status"]
      interval: 2s
      timeout: 3s
      retries: 5

  bootstrap:
    image: openbao/openbao:2.5.2
    depends_on:
      vault:
        condition: service_healthy
    environment:
      BAO_ADDR: "http://vault:8200"
      BAO_TOKEN: root-token
    volumes:
      - ./vault:/vault/config:ro
    entrypoint: ["/bin/sh", "/vault/config/bootstrap.sh"]
    restart: "no"
